# update_courts.yml
# ------------------
# Runs every Monday at 6am UTC.
# Fetches the latest NYC court data via fetch_courts.py,
# commits the updated courts_data.json, and deploys to GitHub Pages.

name: Refresh Court Data

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6am UTC
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest court data
        run: python3 fetch_courts.py

      - name: Commit updated courts_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add courts_data.json
          git diff --staged --quiet || git commit -m "Auto-refresh court data [$(date -u '+%Y-%m-%d')]"
          git push
