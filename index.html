<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Courts</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    #app { display: flex; height: 100vh; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      height: 100%;
      background: #fff;
      box-shadow: 2px 0 16px rgba(0,0,0,0.12);
      z-index: 1000;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }

    /* ── MAP ── */
    #map { flex: 1; height: 100%; }

    /* ── HEADER ── */
    .sidebar-header {
      padding: 22px 20px 18px;
      border-bottom: 1px solid #f0f0f0;
    }
    .sidebar-header h1 {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.5px;
    }
    .sidebar-header p {
      font-size: 11.5px;
      color: #999;
      margin-top: 4px;
      letter-spacing: 0.2px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      padding: 14px 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e2e2;
      border-radius: 8px;
      font-size: 13.5px;
      outline: none;
      color: #222;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: #222; }

    /* ── RESULT COUNT ── */
    .result-count {
      padding: 9px 20px;
      font-size: 12px;
      color: #999;
      background: #fafafa;
      border-bottom: 1px solid #f0f0f0;
    }
    .result-count span { font-weight: 700; color: #333; }

    /* ── SECTIONS ── */
    .section {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .section-title {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #aaa;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .section-desc {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
      line-height: 1.55;
    }

    /* ── LOCATION BUTTON ── */
    .btn-location {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 9px 14px;
      border: 1.5px solid #333;
      border-radius: 8px;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #333;
      margin-bottom: 10px;
      transition: background 0.15s;
    }
    .btn-location:hover { background: #f5f5f5; }

    /* ── ADDRESS INPUT ── */
    .address-input {
      width: 100%;
      padding: 9px 14px;
      border: 1.5px solid #e2e2e2;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
      color: #222;
      transition: border-color 0.2s;
    }
    .address-input:focus { border-color: #222; }

    /* ── DRIVE TIME TOGGLES ── */
    .drive-time-toggles {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .drive-time-btn {
      flex: 1;
      padding: 8px 4px;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      color: #666;
      transition: all 0.15s;
    }
    .drive-time-btn:hover { border-color: #999; color: #333; }
    .drive-time-btn.active { background: #111; border-color: #111; color: #fff; }

    /* ── FILTER BUTTON ── */
    .btn-filter {
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-filter:hover { background: #333; }

    /* ── STATUS MESSAGE ── */
    .status-msg {
      font-size: 12px;
      color: #666;
      margin-top: 9px;
      padding: 8px 10px;
      background: #f8f8f8;
      border-radius: 6px;
      line-height: 1.4;
    }
    .status-msg.error   { color: #b91c1c; background: #fef2f2; }
    .status-msg.success { color: #166534; background: #f0fdf4; }
    .clear-drive {
      display: inline-block;
      margin-left: 6px;
      font-size: 11px;
      color: #555;
      text-decoration: underline;
      cursor: pointer;
    }
    .clear-drive:hover { color: #111; }

    /* ── FILTERS SECTION ── */
    .filters-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .reset-link {
      font-size: 12px;
      color: #777;
      text-decoration: underline;
      cursor: pointer;
    }
    .reset-link:hover { color: #111; }

    .filter-group { margin-bottom: 15px; }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-group-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: #bbb;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 7px;
      cursor: pointer;
    }
    .checkbox-item:last-child { margin-bottom: 0; }
    .checkbox-item input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: #111;
      flex-shrink: 0;
    }
    .checkbox-item label {
      font-size: 13px;
      color: #333;
      cursor: pointer;
      line-height: 1.3;
    }

    /* ── LEGEND ── */
    .legend {
      padding: 14px 20px;
      display: flex;
      gap: 18px;
      border-top: 1px solid #f0f0f0;
      background: #fafafa;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #666; }
    .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.tennis { background: #2563EB; }
    .legend-dot.padel  { background: #7C3AED; }

    /* ── LEAFLET POPUP ── */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
    }
    .leaflet-popup-content { margin: 14px 16px !important; }
  </style>
</head>
<body>
<div id="app">

    </div>

    <!-- Filters -->

        <span class="reset-link" id="resetFilters">Reset all</span>

        <div class="checkbox-item">

        </div>
        <div class="checkbox-item">

          <label for="f-padel">🏓 Padel</label>
        </div>
      </div>

      <div class="filter-group">

          <input type="checkbox" id="f-outdoor" checked data-filter="location" value="outdoor">
          <label for="f-outdoor">Outdoor</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="f-indoor" checked data-filter="location" value="indoor">
          <label for="f-indoor">Indoor</label>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-title">Surface</div>
        <div class="checkbox-item">
          <input type="checkbox" id="f-hard" checked data-filter="surface" value="hard">
          <label for="f-hard">Hard</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="f-clay" checked data-filter="surface" value="clay">
          <label for="f-clay">Clay</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="f-grass" checked data-filter="surface" value="grass">
          <label for="f-grass">Grass</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="f-unknown" checked data-filter="surface" value="unknown">
          <label for="f-unknown">Unknown</label>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-title">Access</div>
        <div class="checkbox-item">
          <input type="checkbox" id="f-free" checked data-filter="access" value="free">
          <label for="f-free">Free / First come first serve</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="f-permit" checked data-filter="access" value="permit">
          <label for="f-permit">NYC Parks Permit</label>
        </div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot tennis"></div> Tennis</div>
      <div class="legend-item"><div class="legend-dot padel"></div> Padel</div>
    </div>

  </div><!-- /sidebar -->

  <div id="map"></div>
</div>

}).addTo(map);

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">
    <path fill="${fillColor}" stroke="rgba(0,0,0,0.18)" stroke-width="1"
      d="M14 1C6.82 1 1 6.82 1 14c0 10.5 13 23 13 23S27 24.5 27 14C27 6.82 21.18 1 14 1z"/>
    <circle fill="white" cx="14" cy="13.5" r="5.5"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [28, 38],
    iconAnchor: [14, 38],
    popupAnchor: [0, -40]
  });
}

  tennis: makePinIcon('#2563EB'),
  padel:  makePinIcon('#7C3AED'),
};

          <td style="padding:3px 10px 3px 0;color:#aaa;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.5px">Sport</td>
          <td style="padding:3px 0;font-weight:600;color:#333">${sportLabel}</td>
        </tr>
        <tr>
          <td style="padding:3px 10px 3px 0;color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:.5px">Location</td>
          <td style="padding:3px 0">${locLabel}</td>
        </tr>
        <tr>
          <td style="padding:3px 10px 3px 0;color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:.5px">Surface</td>
          <td style="padding:3px 0">${surfLabel}</td>
        </tr>
        <tr>
          <td style="padding:3px 10px 3px 0;color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:.5px;vertical-align:top">Access</td>
          <td style="padding:3px 0">${accessLabel}</td>
        </tr>
        <tr>
          <td style="padding:3px 10px 3px 0;color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:.5px">Borough</td>
          <td style="padding:3px 0">${c.borough}</td>
        </tr>
        <tr>
          <td style="padding:5px 10px 0 0;color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:.5px;vertical-align:top">Address</td>
          <td style="padding:5px 0;color:#666;line-height:1.4">${c.address}</td>
        </tr>
      </table>
    </div>
  `);

  m._court = c;
  return m;
});

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
const state = {
  filters: {
    sport:    new Set(['tennis', 'padel']),
    location: new Set(['outdoor', 'indoor']),
    surface:  new Set(['hard', 'clay', 'grass', 'unknown']),
    access:   new Set(['free', 'permit']),
  },
  search: '',
  driveFilter: null,       // null | { lat, lng, maxMinutes }
  selectedMinutes: 15,
  pendingCoords: null,     // coords from geolocation, used when button clicked
};

// ════════════════════════════════════════════════════════════
// HAVERSINE / DRIVE-TIME ESTIMATE
// ════════════════════════════════════════════════════════════
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2
    + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// NYC avg speed ~20 km/h in traffic; circuity factor 1.4 for grid streets
function estDriveMinutes(lat1, lng1, lat2, lng2) {
  return haversineKm(lat1, lng1, lat2, lng2) * 1.4 / 20 * 60;
}

// ════════════════════════════════════════════════════════════
// FILTER ENGINE
// ════════════════════════════════════════════════════════════
function applyFilters() {
  let shown = 0;
  markers.forEach(m => {
    const c = m._court;
    const ok =
      state.filters.sport.has(c.sport) &&
      state.filters.location.has(c.location) &&
      state.filters.surface.has(c.surface) &&
      state.filters.access.has(c.access) &&
      c.name.toLowerCase().includes(state.search.toLowerCase()) &&
      (!state.driveFilter || estDriveMinutes(
        state.driveFilter.lat, state.driveFilter.lng, c.lat, c.lng
      ) <= state.driveFilter.maxMinutes);

    if (ok) { m.addTo(map); shown++; }
    else     { map.removeLayer(m); }
  });
  document.getElementById('courtCount').textContent = shown;
}

// ════════════════════════════════════════════════════════════
// SEARCH
// ════════════════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  applyFilters();
});

// ════════════════════════════════════════════════════════════
// FILTER CHECKBOXES
// ════════════════════════════════════════════════════════════
document.querySelectorAll('input[data-filter]').forEach(cb => {
  cb.addEventListener('change', () => {
    const group = state.filters[cb.dataset.filter];
    cb.checked ? group.add(cb.value) : group.delete(cb.value);
    applyFilters();
  });
});

// ════════════════════════════════════════════════════════════
// RESET ALL FILTERS
// ════════════════════════════════════════════════════════════
document.getElementById('resetFilters').addEventListener('click', () => {
  // Reset filter sets
  state.filters.sport    = new Set(['tennis', 'padel']);
  state.filters.location = new Set(['outdoor', 'indoor']);
  state.filters.surface  = new Set(['hard', 'clay', 'grass', 'unknown']);
  state.filters.access   = new Set(['free', 'permit']);
  state.search = '';
  state.driveFilter = null;
  state.pendingCoords = null;

  // Reset UI
  document.querySelectorAll('input[data-filter]').forEach(cb => cb.checked = true);
  document.getElementById('searchInput').value = '';
  document.getElementById('addressInput').value = '';

  const status = document.getElementById('driveStatus');
  status.style.display = 'none';

  if (window._originMarker) { map.removeLayer(window._originMarker); window._originMarker = null; }

  applyFilters();
});

// ════════════════════════════════════════════════════════════
// DRIVE TIME BUTTONS
// ════════════════════════════════════════════════════════════
document.querySelectorAll('.drive-time-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.drive-time-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.selectedMinutes = parseInt(btn.dataset.minutes);
    // If drive filter is active, re-apply with new time
    if (state.driveFilter) {
      state.driveFilter.maxMinutes = state.selectedMinutes;
      applyFilters();
      showDriveStatus(`Showing courts within ~${state.selectedMinutes} min drive.`, 'success');
    }
  });
});

// ════════════════════════════════════════════════════════════
// USE MY LOCATION
// ════════════════════════════════════════════════════════════
document.getElementById('useLocationBtn').addEventListener('click', () => {
  if (!navigator.geolocation) {
    showDriveStatus('Geolocation is not supported by your browser.', 'error');
    return;
  }
  showDriveStatus('Getting your location…', '');
  navigator.geolocation.getCurrentPosition(
    pos => {
      state.pendingCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      document.getElementById('addressInput').value = 'My current location';
      showDriveStatus('Location found! Click "Filter by drive time" to apply.', 'success');
    },
    () => {
      state.pendingCoords = null;
      showDriveStatus('Could not get your location. Try entering an address instead.', 'error');
    }
  );
});

// Clear pending coords if user edits the address
document.getElementById('addressInput').addEventListener('input', () => {
  state.pendingCoords = null;
});

// ════════════════════════════════════════════════════════════
// GEOCODE + APPLY DRIVE FILTER
// ════════════════════════════════════════════════════════════
document.getElementById('filterDriveBtn').addEventListener('click', async () => {
  // Use geolocation result if available
  if (state.pendingCoords) {
    applyDriveFilter(state.pendingCoords.lat, state.pendingCoords.lng, 'your location');
    return;
  }

  const addr = document.getElementById('addressInput').value.trim();
  if (!addr) {
    showDriveStatus('Enter an address or tap "Use my location" first.', 'error');
    return;
  }

  showDriveStatus('Locating address…', '');

  try {
    const url = 'https://nominatim.openstreetmap.org/search?'
      + new URLSearchParams({ q: addr, format: 'json', limit: '1', countrycodes: 'us' });
    const res  = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();
    if (!data.length) throw new Error('not found');

    const { lat, lon, display_name } = data[0];
    const shortName = display_name.split(',')[0];
    applyDriveFilter(parseFloat(lat), parseFloat(lon), shortName);
  } catch {
    showDriveStatus('Address not found. Try adding "New York, NY" or be more specific.', 'error');
  }
});

function applyDriveFilter(lat, lng, label) {
  state.driveFilter = { lat, lng, maxMinutes: state.selectedMinutes };
  applyFilters();

  // Origin marker
  if (window._originMarker) map.removeLayer(window._originMarker);
  window._originMarker = L.marker([lat, lng], {
    icon: L.divIcon({
      html: `<div style="
        width:16px;height:16px;border-radius:50%;
        background:#f59e0b;border:3px solid #fff;
        box-shadow:0 2px 8px rgba(0,0,0,0.35)"></div>`,
      className: '',
      iconSize: [16, 16],
      iconAnchor: [8, 8],
    })
  }).addTo(map).bindPopup(`<b>Your origin</b><br>${label}`);

  map.setView([lat, lng], 12);

  const count = parseInt(document.getElementById('courtCount').textContent);
  showDriveStatus(
    `${count} court${count !== 1 ? 's' : ''} within ~${state.selectedMinutes} min drive of <b>${label}</b>.
    <span class="clear-drive" id="clearDrive">Clear</span>`,
    'success'
  );

  document.getElementById('clearDrive')?.addEventListener('click', () => {
    state.driveFilter = null;
    if (window._originMarker) { map.removeLayer(window._originMarker); window._originMarker = null; }
    document.getElementById('addressInput').value = '';
    state.pendingCoords = null;
    document.getElementById('driveStatus').style.display = 'none';
    applyFilters();
    map.setView([40.730, -73.950], 11);
  });
}

function showDriveStatus(html, type) {
  const el = document.getElementById('driveStatus');
  el.innerHTML = html;
  el.className = 'status-msg' + (type ? ' ' + type : '');
  el.style.display = 'block';
}
</script>
</body>
</html>
